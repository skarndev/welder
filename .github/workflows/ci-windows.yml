name: Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (a new push to a PR/branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Windows — MSYS2 UCRT64 mingw-w64 gcc 16.1.0 (mainline, carries -freflection).
  # Everything stays inside the MSYS2 subsystem so mingw-built extensions load in
  # the mingw-built interpreters (an MSVC CPython could not import a gcc-built
  # .pyd). At parity with Linux/macOS bar two documented items: the Python rods run
  # their full specs + stubs (against the mingw python; the version-sensitive
  # type-level cases are off — mypy 2.x won't build here) and the LuaBridge3 rod
  # runs its busted specs (Lua 5.5; the module links the Lua import lib per the
  # Windows-PE link model). sol2 stays off: ucrt64 ships only Lua 5.5, which
  # sol2 3.5.0 rejects.
  # ---------------------------------------------------------------------------
  windows:
    name: windows (mingw gcc-16, msys2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-lua
            mingw-w64-ucrt-x86_64-lua-luarocks
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-conan
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-pytest
            mingw-w64-ucrt-x86_64-mypy
            mingw-w64-ucrt-x86_64-python-lark-parser

      - name: Toolchain versions
        run: |
          set -euo pipefail
          gcc --version
          conan --version
          python --version

      - name: Prepare Python test deps
        # uv can't manage the mingw python ("Unknown operating system: mingw_..."),
        # so install the test deps into it directly. pytest/mypy/lark come from
        # pacman above (no source builds); pip adds only the two pure-Python extras.
        # (mypy is pacman's 1.19.x — the pinned mypy 2.x can't build here, its Rust
        # build dep has no mingw wheel; the type-level cases that need 2.x's exact
        # reveal_type spelling are turned off below via WELDER_TEST_TYPINGCASES.)
        # The base mingw python then serves as the test interpreter — its ABI matches
        # the gcc-built extensions — handed to the harness via WELDER_TEST_VENV_PYTHON
        # (which bypasses uv). (No venv: MSYS2's venv layout varies and a bin/python
        # without .exe won't run under native CTest.)
        run: |
          set -euo pipefail
          python -m pip install --break-system-packages --quiet \
            pytest-mypy-testing \
            "pybind11-stubgen @ git+https://github.com/pybind/pybind11-stubgen@main"
          echo "WELDER_TEST_VENV_PYTHON=$(cygpath -m "$(python -c 'import sys; print(sys.executable)')")" \
            >> "$GITHUB_ENV"

      - name: Install busted (Lua 5.5)
        # Provision busted in the shell — luarocks is a shebang script CMake's
        # execute_process can't run on Windows (empty-output failure), and its
        # wrapper is a .bat. Hand the wrapper to the harness via
        # WELDER_BUSTED_EXECUTABLE (which skips the configure-time luarocks call).
        run: |
          set -euo pipefail
          LUA_PREFIX=$(cygpath -m "$MSYSTEM_PREFIX")
          luarocks --lua-version 5.5 --lua-dir "$LUA_PREFIX" \
            --tree "$(pwd)/.lua_modules" install busted 2.3.0
          echo "WELDER_BUSTED_EXECUTABLE=$(cygpath -m "$(pwd)/.lua_modules/bin/busted.bat")" \
            >> "$GITHUB_ENV"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-mingw-${{ hashFiles('conanfile.py', 'conan/profiles/gcc16-mingw') }}
          restore-keys: conan-mingw-

      - name: Conan install
        run: |
          set -euo pipefail
          conan install . -pr:a conan/profiles/gcc16-mingw --build=missing

      - name: Configure
        run: |
          set -euo pipefail
          # Build the extensions against the mingw interpreter (find_package(Python)
          # needs Development.Module, which the base python package carries — the
          # venv doesn't). Detect its minor so this stays correct if ucrt64 moves off
          # 3.14. cygpath gives a forward-slash Windows path CMake accepts.
          PYVER=$(python -c "import sys; print(f'{sys.version_info[0]}.{sys.version_info[1]}')")
          PYEXE=$(cygpath -m "$(python -c 'import sys; print(sys.executable)')")
          LUA_PREFIX=$(cygpath -m "$MSYSTEM_PREFIX")
          cmake --preset welder-gcc16 \
            -DWELDER_WERROR=ON \
            -DWELDER_PYTHON_VERSION="$PYVER" \
            -DPython_EXECUTABLE="$PYEXE" \
            -DWELDER_TEST_VENV_PYTHON="$WELDER_TEST_VENV_PYTHON" \
            -DWELDER_TEST_TYPINGCASES=OFF \
            -DWELDER_BUILD_SOL2=OFF \
            -DWELDER_BUILD_LUABRIDGE=ON \
            -DWELDER_LUABRIDGE_LUA_VERSION=5.5 \
            -DWELDER_LUABRIDGE_LUA_DIR="$LUA_PREFIX" \
            -DWELDER_BUSTED_EXECUTABLE="$WELDER_BUSTED_EXECUTABLE"
          # The Python rods run their full specs + stubs against the mingw-ABI venv
          # prepared above; the LuaBridge3 rod builds its loadable module against the
          # ucrt64 Lua 5.5 (LuaBridge3 supports 5.5; the module links the Lua import
          # lib per the Windows-PE link model) and runs the busted specs via
          # lua-luarocks. sol2 stays off on Windows: ucrt64 ships only Lua 5.5, which
          # sol2 3.5.0 rejects.

      - name: Build
        run: cmake --build --preset welder-gcc16

      - name: Test
        run: ctest --preset welder-gcc16 --output-on-failure

      # The cookbook is a standalone consumer super-project: it obtains welder via
      # FetchContent (redirected to this checkout) and FetchContent-pins the
      # backends itself — no Conan. On Windows the Lua half of recipe 07 runs on
      # LuaBridge3 against the ucrt64 Lua 5.5 (sol2 stays off — it rejects 5.5).
      - name: Cookbook (FetchContent consumption)
        run: |
          set -euo pipefail
          PYVER=$(python -c "import sys; print(f'{sys.version_info[0]}.{sys.version_info[1]}')")
          PYEXE=$(cygpath -m "$(python -c 'import sys; print(sys.executable)')")
          LUA_PREFIX=$(cygpath -m "$MSYSTEM_PREFIX")
          cmake -S examples/cookbook -B build/cookbook -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_SOURCE_DIR_WELDER="$(cygpath -m "$PWD")" \
            -DWELDER_PYTHON_VERSION="$PYVER" \
            -DPython_EXECUTABLE="$PYEXE" \
            -DWELDER_BUILD_SOL2=OFF \
            -DWELDER_LUABRIDGE_LUA_VERSION=5.5 \
            -DWELDER_LUABRIDGE_LUA_DIR="$LUA_PREFIX"
          cmake --build build/cookbook
          ctest --test-dir build/cookbook --output-on-failure

  # ---------------------------------------------------------------------------
  # Windows abi3 — the shippable case. Proves a welder/nanobind extension built
  # with UCRT-MinGW gcc-16 loads in a STOCK MSVC CPython (the interpreter
  # python.org and Blender ship), not just the mingw python. The bridge is
  # nanobind's stable ABI (abi3): the extension links python3.dll via
  # Py_LIMITED_API, and the limited API is a C ABI that's compatible across the
  # GCC/MSVC boundary. (pybind11 has no abi3 equivalent, so this is nanobind-only.)
  # ---------------------------------------------------------------------------
  windows-abi3:
    name: windows abi3 (mingw gcc-16 → MSVC CPython)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The MSVC-built CPython we must load into (python.org / Blender's flavor).
      - uses: actions/setup-python@v5
        id: py
        with:
          python-version: '3.13'

      - name: Install pytest into the MSVC python
        shell: pwsh
        run: |
          & "${{ steps.py.outputs.python-path }}" -m pip install --upgrade pip pytest pytest-mypy-testing

      # UCRT-MinGW gcc — shares the Universal CRT with the MSVC python, closing the
      # CRT gap. conan supplies nanobind's headers (built into the extension).
      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-python-conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-mingw-${{ hashFiles('conanfile.py', 'conan/profiles/gcc16-mingw') }}
          restore-keys: conan-mingw-

      - name: Conan install
        shell: msys2 {0}
        run: conan install . -pr:a conan/profiles/gcc16-mingw --build=missing -o with_pybind11=False -o with_sol2=False

      - name: Configure + build (mingw gcc, abi3, targeting the MSVC python)
        shell: msys2 {0}
        env:
          PY_WIN: ${{ steps.py.outputs.python-path }}
        run: |
          set -euo pipefail
          PYEXE=$(cygpath -m "$PY_WIN")
          cmake --preset welder-gcc16 \
            -DWELDER_WERROR=ON \
            -DPython_EXECUTABLE="$PYEXE" \
            -DWELDER_PYTHON_VERSION=3.13 \
            -DWELDER_BUILD_PYBIND11=OFF \
            -DWELDER_BUILD_SOL2=OFF \
            -DWELDER_BUILD_LUABRIDGE=OFF \
            -DWELDER_BUILD_EXAMPLES=OFF \
            -DWELDER_BUILD_STUBS=OFF \
            -DWELDER_NANOBIND_STABLE_ABI=ON \
            -DWELDER_TEST_VENV_PYTHON="$PYEXE"
          cmake --build --preset welder-gcc16 --target welder_test_nanobind

      - name: Assert the .pyd is abi3 + self-contained
        shell: msys2 {0}
        run: |
          set -euo pipefail
          PYD=$(find build -name 'welder_test_nanobind*.pyd' | head -1)
          echo "artifact: $PYD"
          # abi3 links python3.dll, not python313.dll.
          echo "== DLL dependencies =="; objdump -p "$PYD" | grep 'DLL Name'
          objdump -p "$PYD" | grep -qi 'python3\.dll' \
            || { echo "FAIL: not linked against python3.dll (abi3)"; exit 1; }
          # Self-contained: no gcc runtime DLLs (statically folded in).
          if objdump -p "$PYD" | grep -Eiq 'libstdc\+\+|libgcc|libwinpthread'; then
            echo "FAIL: depends on a gcc runtime DLL"; exit 1
          fi
          echo "OK: abi3 (python3.dll) + self-contained"

      # Prove — unambiguously, outside msys2 — that the importer is the MSVC-built
      # CPython (not the mingw python): assert 'MSC' is in sys.version, then import
      # the mingw-built abi3 .pyd under it.
      - name: Prove the importer is MSVC CPython
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\build\welder-gcc16\tests\python\nanobind"
          & "${{ steps.py.outputs.python-path }}" -c @"
          import sys
          print('interpreter:', sys.executable)
          print('version    :', sys.version)
          assert 'MSC' in sys.version, 'importer is NOT an MSVC build: ' + sys.version
          import welder_test_nanobind as m
          print('imported   :', m.__file__)
          "@

      # The decisive check: run welder's shared nanobind specs under that same MSVC
      # CPython, importing the mingw-built abi3 .pyd. WELDER_TEST_VENV_PYTHON was set
      # to the setup-python interpreter, so ctest runs `<MSVC python> -m pytest`.
      - name: Run nanobind specs under the MSVC CPython
        shell: msys2 {0}
        run: ctest --preset welder-gcc16 -R '^pytest.welder_test_nanobind$' --output-on-failure

      - name: Upload the abi3 .pyd
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: welder-nanobind-abi3-ucrt-mingw
          path: build/welder-gcc16/tests/python/nanobind/welder_test_nanobind*.pyd
          if-no-files-found: warn