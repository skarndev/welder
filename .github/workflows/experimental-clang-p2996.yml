name: clang-p2996 (experimental)

# A best-effort canary: attempt a *full* build of welder with Bloomberg's clang-p2996
# fork (the second toolchain, after gcc-16, to implement P2996 + P3394). The fork
# enables reflection AND annotations behind a single -freflection-latest flag and
# ships its <meta> in libc++ (its default stdlib).
#
# This is EXPECTED TO BE RED for now — the fork + the binding frameworks (pybind11 /
# nanobind / sol2, built under libc++) have not been proven to line up, and the only
# prebuilt compiler is a community image several months old. So the job is:
#   * continue-on-error (never fails the commit / gates nothing),
#   * manual + weekly only (not on every push),
#   * value = the logs, showing how far the build gets as the ecosystem catches up.
# When it goes green we can promote it to a real per-push job with its own badge.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

concurrency:
  group: clang-p2996-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-build:
    name: full build (clang-p2996 fork, libc++)
    runs-on: ubuntu-latest
    continue-on-error: true # experimental canary — must not gate anything
    container:
      # Community prebuilt of the fork (no official image/release exists). clang lives
      # at /opt/p2996/clang and is on PATH; default stdlib is libc++.
      image: vsavkov/clang-p2996:amd64
    steps:
      - uses: actions/checkout@v4

      - name: Compiler + verify -freflection-latest
        run: |
          set -x
          clang++ --version
          # Sanity-check the fork actually accepts the P2996+P3394 flag before we
          # spend time on deps/conan.
          printf 'int main(){}\n' > /tmp/probe.cpp
          clang++ -std=c++26 -freflection-latest /tmp/probe.cpp -o /tmp/probe \
            && echo "OK: -freflection-latest accepted"

      - name: Install build deps
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build git pkg-config ca-certificates \
            python3 python3-dev python3-pip \
            lua5.4 liblua5.4-dev
          # conan brings the C++ binding-framework headers (pybind11/nanobind/sol2).
          pip3 install --break-system-packages --quiet conan

      - name: Conan install (clang / libc++ / c++26)
        run: |
          set -eux
          # Detect the fork's clang, then force libc++ + C++26. (If the fork reports a
          # clang version newer than this conan knows, this is where it fails — a known
          # limitation of the pinned community image.)
          conan profile detect --force
          conan install . --output-folder=build-clang --build=missing \
            -s compiler.cppstd=26 \
            -s compiler.libcxx=libc++

      - name: Configure
        run: |
          set -eux
          # cmake_layout puts the toolchain under build-clang/…/generators; find it
          # rather than hard-coding the build-type path.
          TC=$(find build-clang -name conan_toolchain.cmake | head -1)
          test -n "$TC"
          cmake -S . -B build-clang/cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/$TC" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DWELDER_CLANG_P2996=ON \
            -DWELDER_LUA_VERSION=5.4 \
            -DWELDER_LUA_DIR=/usr \
            -DWELDER_LUABRIDGE_LUA_DIR=/usr

      - name: Build (everything welder can)
        run: cmake --build build-clang/cmake