name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (a new push to a PR/branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux — the primary target. gcc-16 (with -freflection) is provisioned via
  # Homebrew-on-Linux, mirroring the dev machine's g++-16.1 exactly. Conan
  # supplies the C++ binding-framework headers; the language runtimes (Lua,
  # Python) come from brew, matching welder's provider-neutral stance.
  # ---------------------------------------------------------------------------
  linux:
    name: linux (gcc-16, brew)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Homebrew toolchain + runtimes
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix)/sbin" >> "$GITHUB_PATH"
          brew update --quiet
          # gcc → 16.1.0 (gcc-16 / g++-16); the language runtimes + build tools.
          brew install --quiet \
            gcc lua@5.4 luarocks ninja cmake conan uv python@3.14 lua-language-server
          # luarocks pulls linked `lua` 5.5 into the prefix, whose headers shadow
          # the keg-only lua@5.4 on the -isystem path (sol2 then miscompiles against
          # 5.5). Unlink it: we reference the 5.4 keg explicitly via WELDER_LUA_DIR,
          # and luarocks uses its opt-path interpreter regardless. Mirrors the Mac,
          # where no linked 5.5 exists.
          brew unlink lua 2>/dev/null || true
          gcc-16 --version

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-linux-${{ hashFiles('conanfile.py', 'conan/profiles/gcc16-linux') }}
          restore-keys: conan-linux-

      - name: Conan install
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          conan install . -pr:a conan/profiles/gcc16-linux --build=missing

      - name: Configure
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          cmake --preset welder-gcc16 \
            -DWELDER_LUA_DIR="$(brew --prefix lua@5.4)" \
            -DWELDER_LUABRIDGE_LUA_DIR="$(brew --prefix lua@5.4)" \
            -DPython_EXECUTABLE="$(brew --prefix python@3.14)/bin/python3.14"

      - name: Build
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          cmake --build --preset welder-gcc16

      - name: Test
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          ctest --preset welder-gcc16 --output-on-failure

  # ---------------------------------------------------------------------------
  # Windows — MSYS2 UCRT64 mingw-w64 gcc 16.1.0 (mainline, carries -freflection).
  # Everything stays inside the MSYS2 subsystem so mingw-built extensions load in
  # the mingw-built interpreters (an MSVC CPython could not import a gcc-built
  # .pyd). The compiler + Python 3.14 + pybind11 all work here; this job verifies
  # the *portable* surface — the reflection core, the Python rods and the luacats
  # stub rod (+ compile-only core tests). The Lua runtime rods (sol2/LuaBridge3)
  # are OFF pending a Windows port of their loadable-module link model and a
  # Lua-5.4 source (ucrt64 ships 5.5, which sol2 3.5.0 can't use); the Python
  # runtime tests are skipped pending a mingw-ABI pytest path (uv's managed
  # CPython is MSVC-ABI). See TODO(windows-*) markers below.
  # ---------------------------------------------------------------------------
  windows:
    name: windows (mingw gcc-16, msys2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-conan
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-pytest
            mingw-w64-ucrt-x86_64-python-lark-parser

      - name: Toolchain versions
        run: |
          set -euo pipefail
          gcc --version
          conan --version
          python --version

      - name: Prepare Python test deps
        # uv can't manage the mingw python ("Unknown operating system: mingw_..."),
        # so install the test deps into it directly. pytest/lark come from pacman
        # above; the rest via pip. mypy is pinned to the same version the uv.lock
        # env uses (2.1.0) — NOT pacman's, whose older reveal_type spelling
        # ("builtins.int" vs 2.1's "int") fails the type-level cases. MYPY_USE_MYPYC=0
        # keeps it a pure-Python (no-compile) install. The base mingw python then
        # serves as the test interpreter — its ABI matches the gcc-built extensions —
        # handed to the harness via WELDER_TEST_VENV_PYTHON (which bypasses uv). (No
        # venv: MSYS2's venv layout varies and a bin/python without .exe won't run
        # under native CTest.)
        run: |
          set -euo pipefail
          MYPY_USE_MYPYC=0 python -m pip install --break-system-packages --quiet \
            "mypy==2.1.0" \
            pytest-mypy-testing \
            "pybind11-stubgen @ git+https://github.com/pybind/pybind11-stubgen@main"
          echo "WELDER_TEST_VENV_PYTHON=$(cygpath -m "$(python -c 'import sys; print(sys.executable)')")" \
            >> "$GITHUB_ENV"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-mingw-${{ hashFiles('conanfile.py', 'conan/profiles/gcc16-mingw') }}
          restore-keys: conan-mingw-

      - name: Conan install
        run: |
          set -euo pipefail
          conan install . -pr:a conan/profiles/gcc16-mingw --build=missing

      - name: Configure
        run: |
          set -euo pipefail
          # Build the extensions against the mingw interpreter (find_package(Python)
          # needs Development.Module, which the base python package carries — the
          # venv doesn't). Detect its minor so this stays correct if ucrt64 moves off
          # 3.14. cygpath gives a forward-slash Windows path CMake accepts.
          PYVER=$(python -c "import sys; print(f'{sys.version_info[0]}.{sys.version_info[1]}')")
          PYEXE=$(cygpath -m "$(python -c 'import sys; print(sys.executable)')")
          cmake --preset welder-gcc16 \
            -DWELDER_PYTHON_VERSION="$PYVER" \
            -DPython_EXECUTABLE="$PYEXE" \
            -DWELDER_TEST_VENV_PYTHON="$WELDER_TEST_VENV_PYTHON" \
            -DWELDER_BUILD_SOL2=OFF \
            -DWELDER_BUILD_LUABRIDGE=OFF
          # The Python rods run their full specs + stubs here against the mingw-ABI
          # venv prepared above (WELDER_TEST_VENV_PYTHON), so the gcc-built .pyd
          # imports cleanly (uv's managed CPython would be MSVC-ABI, and uv can't
          # manage the mingw python anyway).
          # TODO(windows-lua): the Lua runtime rods are still off — port the loadable
          #   Lua module link model for Windows PE and provision a runtime Lua, then
          #   re-enable WELDER_BUILD_LUABRIDGE (+ lua-luarocks busted specs). sol2
          #   stays off on Windows: ucrt64 ships only Lua 5.5, which sol2 3.5.0 rejects.

      - name: Build
        run: cmake --build --preset welder-gcc16

      - name: Test
        run: ctest --preset welder-gcc16 --output-on-failure