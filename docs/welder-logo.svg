<?xml version="1.0" encoding="UTF-8"?>
<!-- welder mark for the Doxygen C++ reference (PROJECT_LOGO). The "W" weld path
     with a spark struck at its centre vertex, in a single deep-orange tone so it
     reads on both the light and dark reference themes. The two-tone README/docs
     lockups live in docs/content/assets/; geometry source of truth: the
     WelderMark design (viewBox 0 0 128 104). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 104" role="img" aria-label="welder">
  <polyline points="14,20 39,88 64,46 89,88 114,20" fill="none"
            stroke="#e64a19" stroke-width="13" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="64" cy="46" r="19" fill="#e64a19" opacity="0.22"/>
  <g stroke="#e64a19" stroke-width="4.6" stroke-linecap="round">
    <line x1="64" y1="46" x2="64" y2="11"/>
    <line x1="64" y1="46" x2="42" y2="21"/>
    <line x1="64" y1="46" x2="86" y2="21"/>
  </g>
  <circle cx="64" cy="46" r="7.6" fill="#e64a19"/>
</svg>