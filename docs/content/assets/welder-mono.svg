<?xml version="1.0" encoding="UTF-8"?>
<!-- welder mark, single-colour light version — for the amber docs header, where
     the two-tone spark would wash out. The "W" weld path with a spark struck at
     its centre vertex, all in one light tone. Source of truth for the geometry:
     the WelderMark design (viewBox 0 0 128 104). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 104" role="img" aria-label="welder">
  <polyline points="14,20 39,88 64,46 89,88 114,20" fill="none"
            stroke="#ffffff" stroke-width="13" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="64" cy="46" r="19" fill="#ffffff" opacity="0.28"/>
  <g stroke="#ffffff" stroke-width="4.6" stroke-linecap="round">
    <line x1="64" y1="46" x2="64" y2="11"/>
    <line x1="64" y1="46" x2="42" y2="21"/>
    <line x1="64" y1="46" x2="86" y2="21"/>
  </g>
  <circle cx="64" cy="46" r="7.6" fill="#ffffff"/>
</svg>