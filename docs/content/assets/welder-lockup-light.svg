<?xml version="1.0" encoding="UTF-8"?>
<!-- welder logo lockup — light-theme variant (dark "W" for light backgrounds).
     Mark: the "W" weld path with an amber spark struck at its centre vertex.
     Geometry source of truth: the WelderMark design (viewBox 0 0 128 104). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 104" role="img" aria-label="welder">
  <g>
    <polyline points="14,20 39,88 64,46 89,88 114,20" fill="none"
              stroke="#1f2933" stroke-width="13" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="64" cy="46" r="19" fill="#ff7a1a" opacity="0.28"/>
    <g stroke="#ff7a1a" stroke-width="4.6" stroke-linecap="round">
      <line x1="64" y1="46" x2="64" y2="11"/>
      <line x1="64" y1="46" x2="42" y2="21"/>
      <line x1="64" y1="46" x2="86" y2="21"/>
    </g>
    <circle cx="64" cy="46" r="7.6" fill="#ff7a1a"/>
    <circle cx="64" cy="46" r="3.1" fill="#ffffff"/>
  </g>
  <text x="150" y="53" dominant-baseline="central" text-anchor="start"
        font-family="'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="60" font-weight="700" letter-spacing="-1.5" fill="#1f2933">welder</text>
</svg>