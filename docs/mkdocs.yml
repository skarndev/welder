site_name: welder
site_description: >-
  Generate language bindings for annotated C++ types from C++26 reflection —
  no external code generator, no parsing step.
site_author: welder authors
site_url: https://skarndev.github.io/welder/
repo_url: https://github.com/skarndev/welder
repo_name: skarndev/welder
copyright: Built from the real sources by welder's own Doxygen filter.

# Content lives in content/; the site is assembled by CMake (mkdocs build -d …).
# The Doxygen C++ reference is grafted into <site>/api by the inject_reference hook
# (from an out-of-source dir named by WELDER_DOXYGEN_API), so it never has to sit
# inside docs_dir — keeping the worktree clean while serve live-reloads the guide.
docs_dir: content

# inject_reference grafts the Doxygen HTML into <site>/api; apilink turns inline
# code spans naming welder API entities into links onto those pages (driven by the
# Doxygen tag file — see each hook's docstring). Both no-op without
# WELDER_DOXYGEN_API, so a bare `mkdocs build` still works.
hooks:
  - inject_reference.py
  - apilink.py

theme:
  name: material
  # welder = welding: a spark palette (deep-orange / amber) with a light+dark toggle.
  palette:
    # Two entries, each carrying a media query: the initial theme follows the OS,
    # the toggle flips between them, and both are branded deep-orange (no separate
    # "system" entry, which Material would force back to indigo).
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  # The custom welder mark (the "W" weld path with a struck spark). The header bar
  # is amber, so we use the single-colour light version — the two-tone spark would
  # wash out against it. See docs/content/assets/ for the README lockups.
  logo: assets/welder-mono.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

nav:
  - Home: index.md
  - Guide:
      - guide/index.md
      - Getting started: guide/getting-started.md
      - Annotation vocabulary: guide/annotations.md
      - Binding a type: guide/binding-types.md
      - Binding templates: guide/templates.md
      - Enums: guide/enums.md
      - Inheritance: guide/inheritance.md
      - Namespaces & modules: guide/namespaces-modules.md
      - Return policies & lifetimes: guide/return-policies.md
      - Docstrings: guide/docstrings.md
      - Stubs: guide/stubs.md
      - Naming conventions: guide/naming.md
      - The bindability gate: guide/bindability.md
      - Trust & type casters: guide/trust-casters.md
      - Generating C++ docs: guide/cpp-docs.md
      - Extending welder: guide/extending.md
      - Troubleshooting & FAQ: guide/faq.md
  - Cookbook:
      - cookbook/index.md
      - 01 One of everything: cookbook/hello.md
      - 02 Discovery rules: cookbook/discovery.md
      - 03 Inheritance: cookbook/inheritance.md
      - 04 Virtual methods: cookbook/virtuals.md
      - 05 Generated trampolines: cookbook/generated-trampolines.md
      - 06 Templates: cookbook/templates.md
      - 07 One library, two languages: cookbook/multilang.md
      - 08 Tack welding: cookbook/tack-welding.md
      - 09 Custom traversal: cookbook/custom-traversal.md
  - Languages:
      - backends/index.md
      - Python (pybind11 & nanobind): backends/python.md
      - Lua (sol2): backends/lua.md
      - Lua (LuaBridge3): backends/luabridge.md
      - Shipping to multiple languages: backends/multiple.md
  - Architecture:
      - architecture.md
      - The resolution algorithm: resolution.md
      - Header-only for now: header-only.md
  - C++ API Reference: reference.md
